# Used by 'make refresh' to remind you where to upload the loose files.
claude_project_url: "https://claude.ai/projects/REPLACE_ME"

monday:
  api_url: "https://api.monday.com/v2"
  token_env: "MONDAY_API_TOKEN"  # Read from environment variable

sync:
  snapshot_dir: "data/snapshots"
  keep_snapshots: 30  # Days to retain
  stalled_threshold_days: 5
  approaching_deadline_days: 7

# Boards Chef actively manages — authoritative list per intel/chef.md.
