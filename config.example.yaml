# Protocol boards — reference only. Chef reads them to inform decisions but NEVER edits.
# Board list is discovered dynamically by scanning Monday for names starting with name_prefix.
# Content is refreshed every Sunday 23:00 via `bin/chef-cron.sh protocol-refresh`.
protocol_boards:
  discover: true
  name_prefix: "[Protocol]"

